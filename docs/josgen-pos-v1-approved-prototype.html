<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>JosGen Laundry POS — Version 1 Approved Prototype</title>
<style>
:root{--navy:#073b66;--blue:#0d5f96;--teal:#13a7a2;--bg:#f4f8fb;--card:#fff;--text:#163042;--muted:#667985;--line:#d8e3ea;--danger:#b42318;--warn:#b54708;--ok:#067647;--shadow:0 8px 24px rgba(7,59,102,.08)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;font-size:18px}.app{max-width:1480px;margin:auto;padding:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px}.hidden{display:none!important}.muted{color:var(--muted);font-size:.86rem}.brand{display:flex;align-items:center;gap:12px}.brandmark{width:54px;height:54px;border-radius:50%;display:grid;place-items:center;background:linear-gradient(145deg,var(--teal),var(--navy));color:#fff;font-weight:900}.brand h1{font-size:1.3rem;margin:0}.brand p{margin:2px 0 0;color:var(--muted);font-size:.82rem}.topbar{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.nav{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:8px;margin-bottom:12px}.nav button.active{background:var(--navy);color:#fff;border-color:var(--navy)}.layout{display:grid;grid-template-columns:minmax(0,1fr) 390px;gap:12px}.main{display:grid;gap:12px}.side{display:grid;gap:12px;align-content:start}.section-title{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:12px}.section-title h2,.section-title h3{margin:0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.field{display:grid;gap:6px}.field label{font-size:.8rem;color:var(--muted);font-weight:800}.field input,.field select,.field textarea{width:100%;min-height:52px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:white}.field textarea{min-height:82px;resize:vertical}.full{grid-column:1/-1}.actions{display:flex;gap:8px;flex-wrap:wrap}button,input,select,textarea{font:inherit}button{min-height:52px;border:1px solid var(--line);border-radius:12px;background:white;color:var(--text);padding:10px 14px;font-weight:760;cursor:pointer}button.primary{background:var(--navy);color:#fff;border-color:var(--navy)}button.secondary{background:var(--teal);color:#fff;border-color:var(--teal)}button.small{min-height:40px;padding:7px 10px;font-size:.84rem}button.danger{color:var(--danger);border-color:#fda29b}button:disabled{opacity:.45;cursor:not-allowed}.badge{display:inline-flex;align-items:center;border:1px solid var(--line);background:#eef5f8;border-radius:999px;padding:5px 9px;font-size:.78rem;font-weight:760}.badge.ok{background:#ecfdf3;color:var(--ok)}.badge.warn{background:#fffaeb;color:var(--warn)}.badge.info{background:#eff8ff;color:#175cd3}.list{display:grid;gap:10px}.order{border:1px solid var(--line);border-radius:16px;padding:14px;background:#fff}.order-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}.order-title{font-weight:900}.order-meta{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin:10px 0}.meta{background:#f7fafc;border-radius:10px;padding:9px}.meta b{display:block;font-size:.72rem;color:var(--muted)}.subpanel{margin-top:12px;border:1px dashed #aac6d6;background:#f8fcfe;border-radius:14px;padding:13px}.load-card{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:8px;background:white}.adjustment{border-left:4px solid var(--teal);padding:8px 10px;background:#f0fbfa;border-radius:8px;margin-top:6px;font-size:.86rem}.searchbar{display:grid;grid-template-columns:2fr 1fr;gap:8px;margin-bottom:12px}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px}.stat{border:1px solid var(--line);border-radius:14px;padding:13px;background:linear-gradient(180deg,#fff,#f8fbfd)}.stat .label{font-size:.74rem;color:var(--muted);font-weight:800}.stat strong{font-size:1.45rem;display:block;margin:4px 0}.kpi-note{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;min-width:760px}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line);font-size:.82rem}th{background:#edf5f8;color:#27485c}.receipt-panel{position:sticky;top:92px}.receipt{white-space:pre-wrap;font:14px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;background:#f8fafb;border:1px dashed #93a9b6;border-radius:12px;padding:14px;min-height:260px;max-height:520px;overflow:auto}.statusmsg{padding:10px;border-radius:10px;background:#edf8f7;color:#0e5f5b;font-size:.85rem}.login{max-width:580px;margin:7vh auto;display:grid;gap:14px}.divider{height:1px;background:var(--line);margin:14px 0}.empty{text-align:center;color:var(--muted);padding:28px}.notice{border-left:5px solid var(--warn);background:#fffaeb;padding:11px;border-radius:10px}.tabs2{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tabs2 button.active{background:var(--teal);color:#fff}.chart{height:210px;display:flex;align-items:end;gap:8px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px}.bar{flex:1;background:linear-gradient(var(--teal),var(--navy));border-radius:8px 8px 0 0;min-width:18px;position:relative}.bar span{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:.68rem;color:var(--muted)}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.receipt-panel{position:static}.nav{grid-template-columns:repeat(3,1fr)}.stats{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){body{font-size:16px}.app{padding:8px}.grid,.grid3,.searchbar{grid-template-columns:1fr}.nav{grid-template-columns:repeat(2,1fr)}.order-meta{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr 1fr}.topbar{position:static}}
@media print{body *{visibility:hidden}.receipt,.receipt *{visibility:visible}.receipt{position:absolute;left:0;top:0;width:58mm;border:0;font-size:11px}}
</style>
</head>
<body>
<div id="app" class="app">
<section id="loginScreen" class="login">
  <div class="card">
    <div class="brand"><div class="brandmark">JG</div><div><h1>JosGen Laundry</h1><p>Version 1 Approved Prototype</p></div></div>
    <div class="divider"></div>
    <div class="field"><label for="loginRole">Account</label><select id="loginRole"><option value="staff">Staff</option><option value="admin">Admin / Operator</option><option value="owner">Owner</option></select></div>
    <div class="field"><label for="loginPin">PIN</label><input id="loginPin" type="password" inputmode="numeric" placeholder="Enter PIN"></div>
    <button id="loginBtn" class="primary">Login</button>
    <div class="muted">Demo PINs: Staff 1111 · Admin 3333 · Owner 2222</div>
    <div id="loginMsg"></div>
  </div>
</section>

<section id="shell" class="hidden">
<header class="topbar card">
  <div class="brand"><div class="brandmark">JG</div><div><h1>JosGen Laundry POS</h1><p id="shiftLabel">Shift: Open</p></div></div>
  <div class="actions"><span id="syncBadge" class="badge ok">Online · Synced</span><span id="roleBadge" class="badge info"></span><button id="logoutBtn" class="small">Logout</button></div>
</header>
<div id="nav" class="nav"></div>
<div class="layout">
  <main class="main">
    <section id="screen-new" class="screen card"></section>
    <section id="screen-waiting" class="screen card hidden"></section>
    <section id="screen-processing" class="screen card hidden"></section>
    <section id="screen-pickup" class="screen card hidden"></section>
    <section id="screen-search" class="screen card hidden"></section>
    <section id="screen-money" class="screen card hidden"></section>
    <section id="screen-owner" class="screen card hidden"></section>
  </main>
  <aside class="side">
    <section class="card receipt-panel"><div class="section-title"><h3>Print Preview</h3><button id="clearPrint" class="small">Clear</button></div><pre id="receipt" class="receipt">Wala pang print output.</pre></section>
    <section class="card"><h3>Status</h3><div id="statusArea" class="statusmsg">Ready.</div></section>
  </aside>
</div>
</section>
</div>
<script>
(()=>{
'use strict';
const $=s=>document.querySelector(s), money=n=>'PHP '+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}), today='2026-07-14';
const roles={staff:{label:'Staff',pin:'1111'},admin:{label:'Admin / Operator',pin:'3333'},owner:{label:'Owner',pin:'2222'}};
const loadTypes=['Small Load','Light','Heavy','Mixed','Bedsheet & Comforter'];
const state={user:null,active:'new',reportStart:'2026-07-01',reportEnd:today,seq:145,selectedSaved:null,
customers:[{id:'C1',name:'Michael Santos',contact:'09171234567'},{id:'C2',name:'Rica Cruz',contact:'09181234567'},{id:'C3',name:'Ana Reyes',contact:'09991234567'}],
orders:[
{id:'O141',displayNo:'JSG-000141',customerId:'C1',name:'Michael Santos',contact:'09171234567',service:'Complete Service',initialKilo:14,finalKilo:15,estimatedLoadCount:2,finalLoadCount:3,loads:[{no:1,type:'Light'},{no:2,type:'Mixed'},{no:3,type:'Bedsheet & Comforter'}],initialPrice:420,finalPrice:650,status:'READY_FOR_PICKUP',paymentStatus:'PARTIAL',preparedBy:'Joy',receivedAt:'2026-07-14T09:03:00',sinalangAt:'2026-07-14T11:00:00',readyAt:'2026-07-14T15:30:00',releasedAt:null,notes:'Towels and comforter found',adjustmentIds:['A1'],paidCached:300,balanceCached:350},
{id:'O142',displayNo:'JSG-000142',customerId:'C2',name:'Rica Cruz',contact:'09181234567',service:'Wash & Dry',initialKilo:8,finalKilo:8,estimatedLoadCount:1,finalLoadCount:1,loads:[{no:1,type:'Light'}],initialPrice:240,finalPrice:240,status:'PROCESSING',paymentStatus:'PAID',preparedBy:'Joy',receivedAt:'2026-07-14T10:15:00',sinalangAt:'2026-07-14T11:20:00',readyAt:null,releasedAt:null,notes:'',adjustmentIds:[],paidCached:240,balanceCached:0},
{id:'O143',displayNo:'JSG-000143',customerId:'C3',name:'Ana Reyes',contact:'09991234567',service:'Complete Service',initialKilo:10,finalKilo:null,estimatedLoadCount:2,finalLoadCount:null,loads:[],initialPrice:300,finalPrice:null,status:'WAITING',paymentStatus:'NP',preparedBy:'Joy',receivedAt:'2026-07-14T11:10:00',sinalangAt:null,readyAt:null,releasedAt:null,notes:'For segregation',adjustmentIds:[],paidCached:0,balanceCached:300}
],
payments:[{id:'P1',orderId:'O141',amount:300,method:'CASH',paidAt:'2026-07-14T09:05:00',receivedBy:'Joy'},{id:'P2',orderId:'O142',amount:240,method:'GCASH',paidAt:'2026-07-14T10:16:00',receivedBy:'Joy'}],
adjustments:[{id:'A1',orderId:'O141',type:'FINALIZATION',oldValue:'14kg · 2 estimated loads · PHP 420',newValue:'15kg · 3 loads · PHP 650',reason:'Towels and comforter found during segregation',createdBy:'Joy',createdAt:'2026-07-14T10:40:00'}],
expenses:[{id:'E1',category:'SUPPLIES',amount:480,method:'CASH',description:'Detergent and fabcon',expenseDate:'2026-07-14',recordedBy:'Admin'},{id:'E2',category:'UTILITIES',amount:1200,method:'BANK',description:'Water bill partial',expenseDate:'2026-07-10',recordedBy:'Admin'}],
ledger:[{id:'L0',shiftId:'S1',direction:'IN',category:'STARTING_CASH',amount:1000,method:'CASH',date:'2026-07-14',time:'08:00',reason:'Starting cash'},{id:'L1',shiftId:'S1',direction:'IN',category:'CUSTOMER_PAYMENT',amount:300,method:'CASH',date:'2026-07-14',time:'09:05',reason:'JSG-000141'},{id:'L2',shiftId:'S1',direction:'OUT',category:'SUPPLIES',amount:480,method:'CASH',date:'2026-07-14',time:'12:00',reason:'Detergent and fabcon'}],
shift:{id:'S1',name:'Jul 14 AM',openedAt:'2026-07-14T08:00:00',startingCash:1000,status:'OPEN',closedAt:null},closings:[],printLogs:[],auditLogs:[]};

function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function dt(v){if(!v)return'—';const d=new Date(v);return d.toLocaleString('en-PH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function dateOnly(v){return v?String(v).slice(0,10):''}
function setStatus(t){$('#statusArea').textContent=t}
function printText(t,type='OTHER',entityId=''){state.printLogs.push({id:'PR'+Date.now(),type,entityId,printedBy:state.user.label,printedAt:new Date().toISOString()});$('#receipt').textContent=t}
function canOperate(){return state.user&&state.user.role!=='owner'}
function balance(o){return Math.max(0,Number(o.finalPrice??o.initialPrice)-state.payments.filter(p=>p.orderId===o.id).reduce((s,p)=>s+p.amount,0))}
function paid(o){return state.payments.filter(p=>p.orderId===o.id).reduce((s,p)=>s+p.amount,0)}
function payStatus(o){const b=balance(o),p=paid(o);return b===0?'PAID':p>0?'PARTIAL':'NP'}
function finalTotal(o){return Number(o.finalPrice??o.initialPrice)}
function navItems(){if(state.user.role==='owner')return[{id:'owner',label:'Owner Dashboard'},{id:'search',label:'Hanapin Order'},{id:'money',label:'Pera / Reports'}];return[{id:'new',label:'Bagong Laundry'},{id:'waiting',label:'Naghihintay'},{id:'processing',label:'Nilalabhan'},{id:'pickup',label:'Kukunin'},{id:'search',label:'Hanapin Order'},{id:'money',label:'Pera'}]}
function renderNav(){const items=navItems();$('#nav').innerHTML=items.map(x=>`<button data-screen="${x.id}" class="${state.active===x.id?'active':''}">${x.label}</button>`).join('')}
function show(id){state.active=id;document.querySelectorAll('.screen').forEach(x=>x.classList.add('hidden'));$('#screen-'+id).classList.remove('hidden');renderNav();renderScreen(id)}
function renderScreen(id){({new:renderNew,waiting:renderWaiting,processing:renderProcessing,pickup:renderPickup,search:renderSearch,money:renderMoney,owner:renderOwner}[id]||(()=>{}))()}
function refresh(){renderNav();renderScreen(state.active);$('#shiftLabel').textContent=`Shift: ${state.shift.name} · ${state.shift.status}`}
function orderCard(o,body=''){return`<article class="order"><div class="order-head"><div><div class="order-title">${esc(o.displayNo)} · ${esc(o.name)}</div><div class="muted">${esc(o.contact)} · ${esc(o.service)}</div></div><span class="badge ${o.status==='READY_FOR_PICKUP'?'ok':o.status==='WAITING'?'warn':'info'}">${o.status.replaceAll('_',' ')}</span></div><div class="order-meta"><div class="meta"><b>Initial Kilo</b>${o.initialKilo}kg</div><div class="meta"><b>Final Kilo</b>${o.finalKilo??'Pending'}</div><div class="meta"><b>Total</b>${money(finalTotal(o))}</div><div class="meta"><b>Balance</b>${money(balance(o))}</div></div>${body}</article>`}

function renderNew(){if(!canOperate()){show('owner');return}$('#screen-new').innerHTML=`<div class="section-title"><div><h2>Bagong Laundry</h2><div class="muted">Initial details lang muna. Final kilo, loads, at presyo ay sa Ayusin ang Labada.</div></div></div><div class="grid"><div class="field"><label>Customer Name</label><input id="nName" autocomplete="off"></div><div class="field"><label>Contact Number</label><input id="nContact" inputmode="tel"></div><div class="field"><label>Service</label><select id="nService"><option>Complete Service</option><option>Wash & Dry</option><option>Wash Only</option><option>Dry Only</option></select></div><div class="field"><label>Initial Kilo</label><input id="nKilo" type="number" min="0.1" step="0.1"></div><div class="field"><label>Initial Price</label><input id="nPrice" type="number" min="0" step="1"></div><div class="field"><label>Estimated Load (optional)</label><input id="nEstimatedLoad" type="number" min="1" step="1"></div><div class="field"><label>Payment Status</label><select id="nPayStatus"><option value="NP">NP</option><option value="PARTIAL">Partial</option><option value="PAID">Paid</option></select></div><div class="field"><label>Payment Method</label><select id="nPayMethod"><option value="">Select when paid</option><option value="CASH">Cash</option><option value="GCASH">GCash</option><option value="BANK">Bank</option><option value="OTHER">Other</option></select></div><div id="payAmountWrap" class="field hidden"><label>Amount Paid</label><input id="nPayAmount" type="number" min="0" step="1"></div><div class="field"><label>Prepared By</label><input id="nPrepared" value="Joy"></div><div class="field full"><label>Notes</label><textarea id="nNotes"></textarea></div></div><div class="actions" style="margin-top:12px"><button id="saveOrder" class="primary">Save Order</button></div><div id="postSave"></div>`;$('#nPayStatus').onchange=()=>{$('#payAmountWrap').classList.toggle('hidden',$('#nPayStatus').value==='NP')};$('#saveOrder').onclick=saveOrder}
function saveOrder(){const name=$('#nName').value.trim(),contact=$('#nContact').value.trim(),kilo=Number($('#nKilo').value),price=Number($('#nPrice').value),status=$('#nPayStatus').value,method=$('#nPayMethod').value,amt=status==='NP'?0:Number($('#nPayAmount').value||0),prepared=$('#nPrepared').value.trim();if(!name||!contact||kilo<=0||price<0||!prepared)return setStatus('Complete all required fields.');if(status!=='NP'&&!method)return setStatus('Select payment method.');if(amt<0||amt>price)return setStatus('Invalid payment amount.');const id='O'+Date.now(),displayNo='JSG-'+String(++state.seq).padStart(6,'0'),now=new Date().toISOString(),customer={id:'C'+Date.now(),name,contact};state.customers.push(customer);const o={id,displayNo,customerId:customer.id,name,contact,service:$('#nService').value,initialKilo:kilo,finalKilo:null,estimatedLoadCount:Number($('#nEstimatedLoad').value)||null,finalLoadCount:null,loads:[],initialPrice:price,finalPrice:null,status:'WAITING',paymentStatus:status,preparedBy:prepared,receivedAt:now,sinalangAt:null,readyAt:null,releasedAt:null,notes:$('#nNotes').value.trim(),adjustmentIds:[],paidCached:amt,balanceCached:price-amt};state.orders.unshift(o);if(amt>0){const p={id:'P'+Date.now(),orderId:id,amount:amt,method,paidAt:now,receivedBy:prepared};state.payments.push(p);if(method==='CASH')state.ledger.push({id:'L'+Date.now(),shiftId:state.shift.id,direction:'IN',category:'CUSTOMER_PAYMENT',amount:amt,method:'CASH',date:today,time:now.slice(11,16),reason:displayNo})}state.auditLogs.push({action:'ORDER_CREATED',entityId:id,by:state.user.label,at:now});state.selectedSaved=id;renderNew();renderPostSave(o);setStatus(`${displayNo} saved. Print separately.`)}
function renderPostSave(o){$('#postSave').innerHTML=`<div class="subpanel"><h3>Saved: ${o.displayNo}</h3><div class="actions"><button id="printClaim" class="secondary">Print Claim Stub</button><button id="printTag">Print Laundry Tag</button><button id="goWaiting">Go to Naghihintay</button></div></div>`;$('#printClaim').onclick=()=>printText(buildClaim(o),'CLAIM_STUB',o.id);$('#printTag').onclick=()=>printText(buildTag(o),'LAUNDRY_TAG',o.id);$('#goWaiting').onclick=()=>show('waiting')}

function renderWaiting(){const rows=state.orders.filter(o=>o.status==='WAITING'||o.status==='READY_FOR_WASH');$('#screen-waiting').innerHTML=`<div class="section-title"><div><h2>Naghihintay</h2><div class="muted">Ayusin muna bago Isalang.</div></div></div><div class="list">${rows.map(o=>orderCard(o,`<div class="actions"><button data-finalize="${o.id}" class="secondary">Ayusin ang Labada</button>${o.status==='READY_FOR_WASH'?`<button data-isalang="${o.id}" class="primary">Isalang</button>`:''}<button data-claim="${o.id}">Print Claim Stub</button><button data-tag="${o.id}">Print Tag</button></div>${o.adjustmentIds.length?`<div class="subpanel"><b>Adjustment History</b>${state.adjustments.filter(a=>a.orderId===o.id).map(a=>`<div class="adjustment">${esc(a.reason)}<br><span class="muted">${esc(a.oldValue)} → ${esc(a.newValue)}</span></div>`).join('')}</div>`:''}`)).join('')||'<div class="empty">Walang waiting orders.</div>'}</div>`;$('#screen-waiting').querySelectorAll('[data-finalize]').forEach(b=>b.onclick=()=>openFinalize(b.dataset.finalize));$('#screen-waiting').querySelectorAll('[data-isalang]').forEach(b=>b.onclick=()=>{const o=state.orders.find(x=>x.id===b.dataset.isalang);if(!o.finalKilo||!o.finalLoadCount||!o.finalPrice)return setStatus('Complete Ayusin ang Labada first.');if(!confirm(`Isalang ${o.displayNo}?`))return;o.status='PROCESSING';o.sinalangAt=new Date().toISOString();state.auditLogs.push({action:'ISALANG',entityId:o.id,by:state.user.label,at:o.sinalangAt});refresh()});$('#screen-waiting').querySelectorAll('[data-claim]').forEach(b=>b.onclick=()=>{const o=state.orders.find(x=>x.id===b.dataset.claim);printText(buildClaim(o),'CLAIM_STUB',o.id)});$('#screen-waiting').querySelectorAll('[data-tag]').forEach(b=>b.onclick=()=>{const o=state.orders.find(x=>x.id===b.dataset.tag);printText(buildTag(o),'LAUNDRY_TAG',o.id)})}
function openFinalize(id){const o=state.orders.find(x=>x.id===id);const count=o.finalLoadCount||o.estimatedLoadCount||1;$('#screen-waiting').innerHTML=`<div class="section-title"><div><h2>Ayusin ang Labada · ${o.displayNo}</h2><div class="muted">Preserve initial values. Save final values separately.</div></div><button id="backWaiting">Back</button></div><div class="grid"><div class="field"><label>Initial Kilo</label><input value="${o.initialKilo}" disabled></div><div class="field"><label>Final Kilo</label><input id="fKilo" type="number" min="0.1" step="0.1" value="${o.finalKilo??o.initialKilo}"></div><div class="field"><label>Initial Price</label><input value="${o.initialPrice}" disabled></div><div class="field"><label>Final Price</label><input id="fPrice" type="number" min="0" value="${o.finalPrice??o.initialPrice}"></div><div class="field"><label>Final Load Count</label><input id="fLoads" type="number" min="1" value="${count}"></div><div class="field full"><label>Reason for change / segregation notes</label><textarea id="fReason">${o.notes||''}</textarea></div></div><div id="loadEditors"></div><div class="actions" style="margin-top:12px"><button id="saveFinal" class="primary">Confirm Final Details</button></div>`;const renderLoads=()=>{const n=Math.max(1,Number($('#fLoads').value||1));$('#loadEditors').innerHTML=Array.from({length:n},(_,i)=>`<div class="load-card"><b>Load ${i+1}</b><div class="field"><label>Klase ng Load</label><select data-loadtype="${i+1}">${loadTypes.map(t=>`<option ${o.loads[i]?.type===t?'selected':''}>${t}</option>`).join('')}</select></div></div>`).join('')};$('#fLoads').oninput=renderLoads;renderLoads();$('#backWaiting').onclick=renderWaiting;$('#saveFinal').onclick=()=>{const fk=Number($('#fKilo').value),fp=Number($('#fPrice').value),fl=Number($('#fLoads').value),reason=$('#fReason').value.trim();if(fk<=0||fp<0||fl<1)return setStatus('Invalid final values.');const changed=fk!==o.initialKilo||fp!==o.initialPrice||fl!==(o.estimatedLoadCount||fl);if(changed&&!reason)return setStatus('Reason is required when values changed.');const old=`${o.initialKilo}kg · ${o.estimatedLoadCount||'—'} estimated load(s) · ${money(o.initialPrice)}`;o.finalKilo=fk;o.finalPrice=fp;o.finalLoadCount=fl;o.loads=[...document.querySelectorAll('[data-loadtype]')].map((s,i)=>({no:i+1,type:s.value}));o.status='READY_FOR_WASH';if(changed){const a={id:'A'+Date.now(),orderId:o.id,type:'FINALIZATION',oldValue:old,newValue:`${fk}kg · ${fl} load(s) · ${money(fp)}`,reason,createdBy:state.user.label,createdAt:new Date().toISOString()};state.adjustments.push(a);o.adjustmentIds.push(a.id)}state.auditLogs.push({action:'ORDER_FINALIZED',entityId:o.id,by:state.user.label,at:new Date().toISOString()});renderWaiting();setStatus('Final details confirmed. Ready to Isalang.')}}

function renderProcessing(){const rows=state.orders.filter(o=>o.status==='PROCESSING');$('#screen-processing').innerHTML=`<div class="section-title"><div><h2>Nilalabhan</h2><div class="muted">Markahan kapag ready na.</div></div></div><div class="list">${rows.map(o=>orderCard(o,`<div class="actions"><button data-ready="${o.id}" class="primary">Ready for Pickup</button></div>`)).join('')||'<div class="empty">Walang processing orders.</div>'}</div>`;$('#screen-processing').querySelectorAll('[data-ready]').forEach(b=>b.onclick=()=>{const o=state.orders.find(x=>x.id===b.dataset.ready);if(!confirm(`Mark ${o.displayNo} as ready?`))return;o.status='READY_FOR_PICKUP';o.readyAt=new Date().toISOString();state.auditLogs.push({action:'READY_FOR_PICKUP',entityId:o.id,by:state.user.label,at:o.readyAt});refresh()})}
function renderPickup(){const rows=state.orders.filter(o=>o.status==='READY_FOR_PICKUP');$('#screen-pickup').innerHTML=`<div class="section-title"><div><h2>Kukunin</h2><div class="muted">Search by order ID, customer name, or contact.</div></div></div><div class="searchbar"><input id="pickupSearch" placeholder="Search ready orders"><select id="pickupMethod"><option value="CASH">Cash</option><option value="GCASH">GCash</option><option value="BANK">Bank</option><option value="OTHER">Other</option></select></div><div id="pickupList" class="list"></div>`;const draw=()=>{const q=$('#pickupSearch').value.toLowerCase();const filtered=rows.filter(o=>[o.displayNo,o.name,o.contact].some(v=>String(v).toLowerCase().includes(q)));$('#pickupList').innerHTML=filtered.map(o=>orderCard(o,`<div class="subpanel"><b>Load Breakdown</b>${o.loads.map(l=>`<div>Load ${l.no}: ${esc(l.type)}</div>`).join('')}</div><div class="actions"><input data-payamt="${o.id}" type="number" min="0" placeholder="Payment amount" style="max-width:190px"><button data-pay="${o.id}">Receive Payment</button><button data-final="${o.id}">Print Final Receipt</button><button data-release="${o.id}" class="primary" ${balance(o)>0?'disabled':''}>Release Laundry</button></div>`)).join('')||'<div class="empty">No matching ready orders.</div>';$('#pickupList').querySelectorAll('[data-pay]').forEach(b=>b.onclick=()=>receivePayment(b.dataset.pay));$('#pickupList').querySelectorAll('[data-final]').forEach(b=>b.onclick=()=>{const o=state.orders.find(x=>x.id===b.dataset.final);printText(buildFinal(o),'FINAL_RECEIPT',o.id)});$('#pickupList').querySelectorAll('[data-release]').forEach(b=>b.onclick=()=>{const o=state.orders.find(x=>x.id===b.dataset.release);if(balance(o)>0)return setStatus('Cannot release with remaining balance.');if(!confirm(`Release ${o.displayNo}?`))return;o.status='RELEASED';o.releasedAt=new Date().toISOString();state.auditLogs.push({action:'RELEASED',entityId:o.id,by:state.user.label,at:o.releasedAt});refresh()})};$('#pickupSearch').oninput=draw;draw()}
function receivePayment(id){const o=state.orders.find(x=>x.id===id),input=document.querySelector(`[data-payamt="${id}"]`),amount=Number(input.value),method=$('#pickupMethod').value,b=balance(o);if(amount<=0)return setStatus('Payment must be greater than zero.');if(amount>b)return setStatus(`Payment exceeds balance by ${money(amount-b)}. Enter amount applied only.`);const p={id:'P'+Date.now(),orderId:id,amount,method,paidAt:new Date().toISOString(),receivedBy:state.user.label};state.payments.push(p);if(method==='CASH')state.ledger.push({id:'L'+Date.now(),shiftId:state.shift.id,direction:'IN',category:'CUSTOMER_PAYMENT',amount,method:'CASH',date:today,time:new Date().toISOString().slice(11,16),reason:o.displayNo});state.auditLogs.push({action:'PAYMENT_RECEIVED',entityId:id,by:state.user.label,at:p.paidAt});renderPickup();setStatus(`Payment recorded. Remaining: ${money(balance(o))}`)}

function renderSearch(){const statuses=['ALL','WAITING','READY_FOR_WASH','PROCESSING','READY_FOR_PICKUP','RELEASED'];$('#screen-search').innerHTML=`<div class="section-title"><div><h2>Hanapin Order</h2><div class="muted">Order ID, customer name, or contact number.</div></div></div><div class="searchbar"><input id="orderSearch" placeholder="Search"><select id="statusFilter">${statuses.map(s=>`<option>${s}</option>`).join('')}</select></div><div id="searchResults" class="list"></div>`;const draw=()=>{const q=$('#orderSearch').value.toLowerCase(),s=$('#statusFilter').value;const rows=state.orders.filter(o=>(s==='ALL'||o.status===s)&&[o.displayNo,o.name,o.contact].some(v=>String(v).toLowerCase().includes(q)));$('#searchResults').innerHTML=rows.map(o=>orderCard(o,`<div class="muted">Received: ${dt(o.receivedAt)} · Ready: ${dt(o.readyAt)} · Released: ${dt(o.releasedAt)}</div>`)).join('')||'<div class="empty">No matching order.</div>'};$('#orderSearch').oninput=draw;$('#statusFilter').onchange=draw;draw()}

function cashExpected(){return state.ledger.filter(x=>x.shiftId===state.shift.id&&x.method==='CASH').reduce((s,x)=>s+(x.direction==='IN'?x.amount:-x.amount),0)}
function renderMoney(){if(state.user.role==='owner')renderOwnerReports();else renderOperationsMoney()}
function renderOperationsMoney(){const expected=cashExpected();$('#screen-money').innerHTML=`<div class="section-title"><div><h2>Pera</h2><div class="muted">Expenses, cash movements, and shift closing.</div></div></div><div class="tabs2"><button id="tabExpense" class="active">Record Expense</button><button id="tabCash">Cash In / Out</button><button id="tabClose">Isara ang Shift</button></div><div id="moneyBody"></div>`;const expense=()=>{$('#moneyBody').innerHTML=`<div class="grid"><div class="field"><label>Category</label><select id="eCategory"><option value="SUPPLIES">Supplies</option><option value="UTILITIES">Utilities</option><option value="REPAIR">Repair</option><option value="TRANSPORTATION">Transportation</option><option value="OTHER">Other</option></select></div><div class="field"><label>Amount</label><input id="eAmount" type="number" min="0"></div><div class="field"><label>Payment Method</label><select id="eMethod"><option value="CASH">Cash</option><option value="GCASH">GCash</option><option value="BANK">Bank</option><option value="OTHER">Other</option></select></div><div class="field"><label>Description</label><input id="eDescription"></div></div><button id="saveExpense" class="primary" style="margin-top:12px">Save Expense</button>`;$('#saveExpense').onclick=()=>{const amount=Number($('#eAmount').value);if(amount<=0)return setStatus('Expense amount must be greater than zero.');const e={id:'E'+Date.now(),category:$('#eCategory').value,amount,method:$('#eMethod').value,description:$('#eDescription').value.trim(),expenseDate:today,recordedBy:state.user.label};state.expenses.push(e);if(e.method==='CASH')state.ledger.push({id:'L'+Date.now(),shiftId:state.shift.id,direction:'OUT',category:e.category,amount,method:'CASH',date:today,time:new Date().toISOString().slice(11,16),reason:e.description});state.auditLogs.push({action:'EXPENSE_RECORDED',entityId:e.id,by:state.user.label,at:new Date().toISOString()});expense();setStatus('Expense saved.')}};const cash=()=>{$('#moneyBody').innerHTML=`<div class="grid"><div class="field"><label>Direction</label><select id="cDirection"><option value="IN">Cash In</option><option value="OUT">Cash Out</option></select></div><div class="field"><label>Category</label><select id="cCategory"><option value="OTHER_CASH_IN">Other Cash In</option><option value="OWNER_WITHDRAWAL">Owner Withdrawal</option><option value="REFUND">Refund</option><option value="OTHER_CASH_OUT">Other Cash Out</option></select></div><div class="field"><label>Amount</label><input id="cAmount" type="number" min="0"></div><div class="field"><label>Reason</label><input id="cReason"></div></div><button id="saveCash" class="primary" style="margin-top:12px">Save Cash Movement</button>`;$('#saveCash').onclick=()=>{const amount=Number($('#cAmount').value);if(amount<=0)return setStatus('Amount must be greater than zero.');state.ledger.push({id:'L'+Date.now(),shiftId:state.shift.id,direction:$('#cDirection').value,category:$('#cCategory').value,amount,method:'CASH',date:today,time:new Date().toISOString().slice(11,16),reason:$('#cReason').value.trim()});cash();setStatus('Cash movement saved.')}};const close=()=>{$('#moneyBody').innerHTML=`<div class="stats"><div class="stat"><span class="label">Expected Cash</span><strong>${money(expected)}</strong></div><div class="stat"><span class="label">Shift Status</span><strong>${state.shift.status}</strong></div></div><div class="grid" style="margin-top:12px"><div class="field"><label>Actual Cash Counted</label><input id="actualCash" type="number" min="0"></div><div class="field"><label>Closing Notes</label><input id="closingNotes"></div></div><div class="actions" style="margin-top:12px"><button id="closeShift" class="primary">Close Shift</button><button id="printClose">Print Closing Summary</button></div><div id="closeResult"></div>`;$('#closeShift').onclick=()=>{if(state.shift.status==='CLOSED')return setStatus('Shift is already closed.');const actual=Number($('#actualCash').value),diff=actual-expected,notes=$('#closingNotes').value.trim();if(!Number.isFinite(actual)||actual<0)return setStatus('Enter actual cash.');if(diff!==0&&!notes)return setStatus('Notes required for short or over.');const c={id:'CL'+Date.now(),shiftId:state.shift.id,expectedCash:expected,actualCash:actual,difference:diff,notes,closedBy:state.user.label,closedAt:new Date().toISOString()};state.closings.push(c);state.shift.status='CLOSED';state.shift.closedAt=c.closedAt;$('#closeResult').innerHTML=`<div class="subpanel"><b>${diff===0?'MATCHED':diff<0?'SHORT':'OVER'}</b><br>Difference: ${money(diff)}</div>`;refresh()};$('#printClose').onclick=()=>printText(buildClosing(state.closings.at(-1)||{expectedCash:expected,actualCash:0,difference:-expected,closedBy:state.user.label,closedAt:null}),'SHIFT_CLOSING',state.shift.id)};$('#tabExpense').onclick=expense;$('#tabCash').onclick=cash;$('#tabClose').onclick=close;expense()}

function recordsBetween(rows,dateField){return rows.filter(x=>{const d=dateOnly(x[dateField]);return d>=state.reportStart&&d<=state.reportEnd})}
function ownerMetrics(){const periodPayments=recordsBetween(state.payments,'paidAt'),periodExpenses=state.expenses.filter(e=>e.expenseDate>=state.reportStart&&e.expenseDate<=state.reportEnd),periodOrders=recordsBetween(state.orders,'receivedAt'),collected=periodPayments.reduce((s,x)=>s+x.amount,0),expenses=periodExpenses.reduce((s,x)=>s+x.amount,0),unpaid=state.orders.filter(o=>dateOnly(o.receivedAt)<=state.reportEnd).reduce((s,o)=>s+balance(o),0),ready=state.orders.filter(o=>o.status==='READY_FOR_PICKUP').length,expected=state.closings.filter(c=>dateOnly(c.closedAt)>=state.reportStart&&dateOnly(c.closedAt)<=state.reportEnd).reduce((s,c)=>s+c.expectedCash,0),actual=state.closings.filter(c=>dateOnly(c.closedAt)>=state.reportStart&&dateOnly(c.closedAt)<=state.reportEnd).reduce((s,c)=>s+c.actualCash,0);return{periodOrders,collected,expenses,net:collected-expenses,unpaid,ready,expected,actual}}
function renderOwner(){const m=ownerMetrics();$('#screen-owner').innerHTML=`<div class="section-title"><div><h2>Owner Dashboard</h2><div class="muted">All period cards follow the selected date range.</div></div></div><div class="grid"><div class="field"><label>Start Date</label><input id="rStart" type="date" value="${state.reportStart}"></div><div class="field"><label>End Date</label><input id="rEnd" type="date" value="${state.reportEnd}"></div></div><div class="stats" style="margin-top:12px"><div class="stat"><span class="label">Collected Payments</span><strong>${money(m.collected)}</strong><div class="kpi-note">Period KPI · payment date</div></div><div class="stat"><span class="label">Expenses</span><strong>${money(m.expenses)}</strong><div class="kpi-note">Period KPI · expense date</div></div><div class="stat"><span class="label">Estimated Net Profit</span><strong>${money(m.net)}</strong><div class="kpi-note">Period KPI</div></div><div class="stat"><span class="label">Orders Received</span><strong>${m.periodOrders.length}</strong><div class="kpi-note">Period KPI</div></div><div class="stat"><span class="label">Outstanding Balance</span><strong>${money(m.unpaid)}</strong><div class="kpi-note">Snapshot as of end date</div></div><div class="stat"><span class="label">Ready for Pickup</span><strong>${m.ready}</strong><div class="kpi-note">Current backlog</div></div><div class="stat"><span class="label">Expected Cash</span><strong>${money(m.expected)}</strong><div class="kpi-note">Closed shifts in period</div></div><div class="stat"><span class="label">Short / Over</span><strong>${money(m.actual-m.expected)}</strong><div class="kpi-note">Closed shifts in period</div></div></div><div class="subpanel"><h3>Collected Payments Trend</h3><div id="ownerChart" class="chart"></div></div><div class="subpanel"><h3>Daily Report</h3>${dailyReportTable()}</div>`;$('#rStart').onchange=e=>{state.reportStart=e.target.value;renderOwner()};$('#rEnd').onchange=e=>{state.reportEnd=e.target.value;renderOwner()};renderOwnerChart()}
function dailyReportTable(){const days={};recordsBetween(state.payments,'paidAt').forEach(p=>{const d=dateOnly(p.paidAt);days[d]??={collected:0,expenses:0,orders:0};days[d].collected+=p.amount});state.expenses.filter(e=>e.expenseDate>=state.reportStart&&e.expenseDate<=state.reportEnd).forEach(e=>{days[e.expenseDate]??={collected:0,expenses:0,orders:0};days[e.expenseDate].expenses+=e.amount});recordsBetween(state.orders,'receivedAt').forEach(o=>{const d=dateOnly(o.receivedAt);days[d]??={collected:0,expenses:0,orders:0};days[d].orders++});return`<div class="tablewrap"><table><thead><tr><th>Date</th><th>Orders</th><th>Collected</th><th>Expenses</th><th>Net</th></tr></thead><tbody>${Object.entries(days).sort().map(([d,x])=>`<tr><td>${d}</td><td>${x.orders}</td><td>${money(x.collected)}</td><td>${money(x.expenses)}</td><td>${money(x.collected-x.expenses)}</td></tr>`).join('')||'<tr><td colspan="5">No data</td></tr>'}</tbody></table></div>`}
function renderOwnerChart(){const days={};recordsBetween(state.payments,'paidAt').forEach(p=>{const d=dateOnly(p.paidAt);days[d]=(days[d]||0)+p.amount});const vals=Object.entries(days).sort(),max=Math.max(1,...vals.map(x=>x[1]));$('#ownerChart').innerHTML=vals.map(([d,v])=>`<div class="bar" style="height:${Math.max(5,v/max*100)}%" title="${d}: ${money(v)}"><span>${d.slice(8)}</span></div>`).join('')||'<div class="empty">No data</div>'}
function renderOwnerReports(){const m=ownerMetrics();$('#screen-money').innerHTML=`<div class="section-title"><div><h2>Pera / Reports</h2><div class="muted">Owner view-only financial detail.</div></div></div><div class="stats"><div class="stat"><span class="label">Collected</span><strong>${money(m.collected)}</strong></div><div class="stat"><span class="label">Expenses</span><strong>${money(m.expenses)}</strong></div><div class="stat"><span class="label">Net</span><strong>${money(m.net)}</strong></div><div class="stat"><span class="label">Outstanding</span><strong>${money(m.unpaid)}</strong></div></div><h3>Expenses</h3><div class="tablewrap"><table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Method</th><th>Amount</th></tr></thead><tbody>${state.expenses.filter(e=>e.expenseDate>=state.reportStart&&e.expenseDate<=state.reportEnd).map(e=>`<tr><td>${e.expenseDate}</td><td>${e.category}</td><td>${esc(e.description)}</td><td>${e.method}</td><td>${money(e.amount)}</td></tr>`).join('')||'<tr><td colspan="5">No expenses</td></tr>'}</tbody></table></div>`}

function receiptHeader(title){return`JOSGEN LAUNDRY\n${title}\n------------------------\n`}
function buildClaim(o){return receiptHeader('CLAIM STUB')+`Order: ${o.displayNo}\nName: ${o.name}\nDate: ${dateOnly(o.receivedAt)}\nTime: ${o.receivedAt.slice(11,16)}\nKilo: ${o.initialKilo}kg (initial)\n\nInitial Price: PHP ${o.initialPrice}\nPaid: PHP ${paid(o)}\nBalance: PHP ${balance(o)}\nStatus: ${payStatus(o)}\n\nFinal price may change after\nchecking and segregation.\n\nPresent this when claiming.`}
function buildTag(o){return receiptHeader('TAG / BAG COPY')+`Order: ${o.displayNo}\nName: ${o.name}\nDate: ${dateOnly(o.receivedAt)}\nTime: ${o.receivedAt.slice(11,16)}\nService: ${o.service}\nKilo: ${o.initialKilo}kg\nPay: ${payStatus(o)}`}
function buildFinal(o){const ads=state.adjustments.filter(a=>a.orderId===o.id);return receiptHeader('FINAL RECEIPT')+`Order: ${o.displayNo}\nName: ${o.name}\n\nInitial Kilo: ${o.initialKilo}kg\nFinal Kilo: ${o.finalKilo}kg\nFinal Loads: ${o.finalLoadCount}\n${o.loads.map(l=>`Load ${l.no}: ${l.type}`).join('\n')}\n\nInitial Price: PHP ${o.initialPrice}\n${ads.map(a=>`Adjustment: ${a.reason}`).join('\n')}\nFinal Price: PHP ${finalTotal(o)}\nPaid: PHP ${paid(o)}\nBalance: PHP ${balance(o)}\n\nReleased: ${dt(o.releasedAt)}\nReleased by: ${state.user.label}`}
function buildClosing(c){return receiptHeader('SHIFT CLOSING')+`Shift: ${state.shift.name}\nExpected Cash: PHP ${c.expectedCash}\nActual Cash: PHP ${c.actualCash}\nDifference: PHP ${c.difference}\nStatus: ${c.difference===0?'MATCHED':c.difference<0?'SHORT':'OVER'}\nClosed by: ${c.closedBy}\nClosed at: ${dt(c.closedAt)}`}

$('#loginBtn').onclick=()=>{const r=$('#loginRole').value,p=$('#loginPin').value;if(roles[r].pin!==p){$('#loginMsg').textContent='Wrong account or PIN.';return}state.user={role:r,label:roles[r].label};$('#loginScreen').classList.add('hidden');$('#shell').classList.remove('hidden');$('#roleBadge').textContent=state.user.label;state.active=r==='owner'?'owner':'new';refresh();setStatus('Login successful. Demo only.')};
$('#logoutBtn').onclick=()=>{state.user=null;$('#shell').classList.add('hidden');$('#loginScreen').classList.remove('hidden');$('#loginPin').value=''};
$('#nav').onclick=e=>{const b=e.target.closest('[data-screen]');if(b)show(b.dataset.screen)};
$('#clearPrint').onclick=()=>$('#receipt').textContent='Wala pang print output.';
})();
</script>
</body>
</html>
